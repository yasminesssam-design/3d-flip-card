<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة الأكواد في أعماق البحر 🌊 | Mohtarf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="ocean-canvas"></canvas>

<header class="top-bar">
  <img src="logo_transparent.png" alt="Mohtarf by a2zlearn" class="logo">
  <div class="title-block">
    <h1 class="site-title">رحلة الأكواد في أعماق البحر</h1>
    <p class="site-sub">درس تفاعلي برسوم Canvas 🎨</p>
  </div>
</header>

<main class="deck">

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="slide-counter" id="slide-counter">شريحة 1 من 1</div>

  <div class="slide-viewport">
    <div class="slide" id="slide-content"></div>
  </div>

  <div class="nav-controls">
    <button id="prev-btn" class="nav-btn">➡️ السابق</button>
    <div class="section-pill" id="section-pill">مقدمة</div>
    <button id="next-btn" class="nav-btn primary">التالي ⬅️</button>
  </div>

  <p class="canvas-hint">💡 دوس على السمكة اللي بتلمع في البحر عشان تفتح كودها كمان!</p>

</main>

<footer class="footer">
  <p>صُنع بحب لأبطال الأكواد الصغار 💙 &nbsp;|&nbsp; Mohtarf by a2zlearn</p>
</footer>

<div class="confetti-layer" id="confetti"></div>

<script src="script.js"></script>
</body>
</html>
